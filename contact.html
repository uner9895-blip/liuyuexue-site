  <header>

      <a class="logo" href="index.html" aria-label="六月雪首页">

      <button class="burger-btn" type="button" aria-label="打开导航菜单" aria-expanded="false" aria-controls="site-menu">

    </nav>

  <main class="page-fade">
    <section class="page-title-section">
      <h1 class="page-title">联系我</h1>
      <p class="page-subtitle">联系方式暂定</p>
    </section>

    <div class="contact-container">
      <section class="contact-info" aria-label="联系方式">
        <div>
          <h2 class="section-subheading">联系方式</h2>
          <div class="contact-item">
            <span class="contact-label">电子邮箱</span>
            <span class="contact-value">暂定</span>
          </div>
        </div>

        <div class="contact-item">
          <span class="contact-label">社交链接</span>
          <div class="social-links">
            <span class="social-icon">社交链接一：暂定</span>
            <span class="social-icon">社交链接二：暂定</span>
            <span class="social-icon">社交链接三：暂定</span>
          </div>
        </div>

        <div class="placeholder-panel">
          联系说明待补充。当前页面为 GitHub Pages 静态站，不包含后端、数据库或真实留言保存功能。
        </div>
      </section>

      <section class="contact-form-wrapper" aria-label="留言表单占位">
        <h2 class="section-subheading">留言笺</h2>
        <form id="contact-form" autocomplete="off">
          <div class="form-group">
            <label for="form-name" class="form-label">称呼</label>
            <input type="text" id="form-name" class="form-control" placeholder="待填写" required>
          </div>

          <div class="form-group">
            <label for="form-email" class="form-label">电子邮箱</label>
            <input type="email" id="form-email" class="form-control" placeholder="待填写" required>
          </div>

          <div class="form-group">
            <label for="form-message" class="form-label">留言内容</label>
            <textarea id="form-message" class="form-control" placeholder="待填写" required></textarea>
          </div>

          <button type="submit" class="btn-ink">模拟提交</button>
        </form>
      </section>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p class="footer-text">© 2026 六月雪. All Rights Reserved. 托管于 GitHub Pages</p>
